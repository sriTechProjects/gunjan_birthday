<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Surprise! 🎉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="celebration-bg">
    <div id="transition-overlay"></div>
    <script src="transition.js"></script>
    <main class="celebration-container">
      <div class="celebration-inner">
        <h1 class="celebrate-primary">Wait wait wait 😆<br/>You thought it's over?</h1>
        <h2 id="secondary" class="celebrate-secondary">Not yet…<br/>Birthday surprise loading 🌻</h2>

        <button id="finalBtn" class="celebrate-btn">Ok show the final message 🎂</button>
      </div>

      <!-- floating sunflowers placed absolutely -->
      <span class="sunflower" style="left:6%; top:12%; animation-duration:6s;">🌻</span>
      <span class="sunflower" style="right:8%; top:18%; animation-duration:5.2s; animation-delay:0.4s;">🌻</span>
      <span class="sunflower" style="left:22%; bottom:20%; animation-duration:5.6s; animation-delay:0.8s;">🌻</span>
      <span class="sunflower" style="right:24%; bottom:14%; animation-duration:6.2s; animation-delay:0.2s;">🌻</span>
      <span class="sunflower" style="left:48%; top:6%; font-size:42px; animation-duration:4.8s;">🌻</span>

      <!-- confetti pieces: generate a variety in HTML for CSS animation -->
      <div aria-hidden="true">
        <span class="confetti-piece" style="left:6%; background:#FFD54F; animation-duration:3.8s; animation-delay:0.2s;"></span>
        <span class="confetti-piece" style="left:18%; background:#FFB300; animation-duration:4.6s; animation-delay:0.8s;"></span>
        <span class="confetti-piece" style="left:30%; background:#FFF8E1; animation-duration:3.2s; animation-delay:0.1s;"></span>
        <span class="confetti-piece" style="left:44%; background:#FFECB3; animation-duration:5.0s; animation-delay:0.4s;"></span>
        <span class="confetti-piece" style="left:58%; background:#FFB300; animation-duration:4.2s; animation-delay:0.6s;"></span>
        <span class="confetti-piece" style="left:72%; background:#FFD54F; animation-duration:3.6s; animation-delay:0.3s;"></span>
        <span class="confetti-piece" style="left:84%; background:#FFF8E1; animation-duration:4.8s; animation-delay:0.9s;"></span>
      </div>
    </main>

    <script>
      // Show the second text after 1.5 seconds
      const secondary = document.getElementById('secondary');
      setTimeout(() => secondary.classList.add('visible'), 1500);

      // Redirect to final page when button clicked
      const finalBtn = document.getElementById('finalBtn');
      finalBtn.addEventListener('click', () => {
        finalBtn.disabled = true;
        finalBtn.style.transform = 'scale(0.98)';
        setTimeout(() => { if (window.navigateWithTransition) navigateWithTransition('final.html'); else window.location.href = 'final.html'; }, 160);
      });
      finalBtn.addEventListener('keyup', (e) => { if (e.key === 'Enter') finalBtn.click(); });
    </script>
  </body>
</html>
